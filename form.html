<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="container mt-4">
    <a href="index.html">Home</a>
    <a href="multimedia.html">Multimedia</a>
    <h1>Form Pendaftaran Anggota</h1>
    <form id="myForm">
        <label for="name">Nama:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="phone">Nomor Telepon:</label><br>
        <input type="tel" id="phone" name="phone"><br><br>

        <label for="minat">Bidang Minat:</label><br>
        <select id="minat" name="minat">
            <option value="web">Web Development</option>
            <option value="mobile">Mobile Development</option>
            <option value="data">Data Science</option>
            <option value="ai">Artificial Intelligence</option>
        </select><br><br>        
        <button type="button" onclick="simpanData()" class="btn btn-primary">Daftar</button>
    </form>

    <script>
        let anggota = [];
        function simpanData() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const minat = document.getElementById('minat').value;

            anggota.push({ name, email, phone, minat });
            console.log(anggota);
            alert('Data berhasil disimpan!');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
